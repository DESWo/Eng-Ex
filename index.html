<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Discover what engineers actually do through fun, interactive challenges. No tests, no grades, just exploration."
    />
    <meta property="og:title" content="Engineering Explorer" />
    <meta
      property="og:description"
      content="12 engineering fields, 36 games, 5 levels each. Discover what engineers actually do. No tests, no grades, just exploration."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://deswo.github.io/Eng-Ex/" />
    <meta name="twitter:card" content="summary" />
    <title>Engineering Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      An academic-technical type system: a scholarly serif for headings, IBM
      Plex Sans for reading, and IBM Plex Mono for every measured value. Plex
      was drawn for technical documentation, which is exactly the register
      this app wants.
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply the saved theme before first paint so the page never flashes.
      // Default to the light "cream" look for everyone; only go dark when the
      // visitor has explicitly chosen it with the toggle. (Following the OS
      // preference meant anyone on a dark system landed on a near-black page.)
      ;(function () {
        var dark = localStorage.getItem('ee:theme') === 'dark'
        document.documentElement.classList.toggle('dark', dark)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
