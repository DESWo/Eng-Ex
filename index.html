<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Discover what engineers actually do through fun, interactive challenges. No tests, no grades, just exploration."
    />
    <meta property="og:title" content="Engineering Explorer" />
    <meta
      property="og:description"
      content="11 engineering fields, 33 games, 5 levels each. Discover what engineers actually do. No tests, no grades, just exploration."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://deswo.github.io/Eng-Ex/" />
    <meta name="twitter:card" content="summary" />
    <title>Engineering Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Nunito:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply the saved theme before first paint so the page never flashes.
      ;(function () {
        var stored = localStorage.getItem('ee:theme')
        var dark = stored
          ? stored === 'dark'
          : window.matchMedia('(prefers-color-scheme: dark)').matches
        document.documentElement.classList.toggle('dark', dark)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
